<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Red-House • Zero’s Office</title>
  <style>
    :root{--bg:#070711;--bg2:#0d0a1d;--cyan:#6ef8ff;--edge:#6f5bb4}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(1200px 700px at 50% 10%, #241a54 0%, var(--bg2) 45%, var(--bg) 100%);color:#fff;font-family:ui-sans-serif,system-ui}
    .stars{position:fixed;inset:0;pointer-events:none;opacity:.35;background-image:radial-gradient(#ffffffcc 1px,transparent 1px);background-size:3px 3px;mask-image:radial-gradient(circle at center,black 38%,transparent 86%)}
    header{max-width:1100px;margin:0 auto;padding:18px 16px;display:flex;justify-content:space-between;align-items:center}
    .brand{font-weight:900;letter-spacing:.14em;font-size:12px;color:#dcd6ff;text-transform:uppercase}
    .badge{font-size:12px;padding:7px 10px;border:1px solid #ffffff2a;border-radius:999px;background:#0000004a}
    .wrap{max-width:1100px;margin:0 auto;padding:0 16px 40px}
    .hint{font-size:13px;color:#c9c2ef;margin:8px 0}
    .card{border:1px solid #ffffff1f;background:#00000040;border-radius:16px;padding:12px}
    #stage{display:block;width:100%;height:min(72vh,720px);border-radius:16px}
    .note{margin-top:10px;font-size:13px;color:#c9c2ef}
    a{color:var(--cyan)}
    .error{margin-top:10px;border:1px solid #ff8a8a55;padding:10px;border-radius:10px;background:#3a121244;color:#ffdede;display:none}
  </style>
</head>
<body>
  <div class="stars"></div>
  <header>
    <div class="brand">RED-HOUSE // ROOM 01</div>
    <div class="badge">Zero’s Office • isometric prototype</div>
  </header>
  <div class="wrap">
    <div class="hint">Cozy-luxury + cyan glow. Tap hotspots.</div>
    <div class="card">
      <canvas id="stage"></canvas>
      <div class="hint">Hotspots: Desk, Console, Fireplace, Door • Code: <a href="https://github.com/KuramaXcode/Red-House" target="_blank">GitHub</a></div>
      <div id="err" class="error"></div>
    </div>
    <div class="card note">Zero note: v0.1 geometry + interactivity. Next: real pixel sprites.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
  <script>
    (function(){
      const err = document.getElementById('err');
      const fail = (m)=>{ err.style.display='block'; err.textContent='Render error: '+m; console.error(m); };
      try {
        if(!window.PIXI) return fail('PIXI CDN blocked');
        const canvas = document.getElementById('stage');
        const app = new PIXI.Application({
          view: canvas,
          resizeTo: canvas.parentElement,
          backgroundAlpha: 0,
          antialias: false,
          resolution: window.devicePixelRatio || 1,
          autoDensity: true
        });

        const world = new PIXI.Container();
        app.stage.addChild(world);

        const TILE_W=32, TILE_H=16;
        const iso=(i,j)=>({x:(i-j)*(TILE_W/2),y:(i+j)*(TILE_H/2)});

        function center(){
          world.x = app.renderer.width/2;
          world.y = app.renderer.height/2 + 60;
        }
        center();

        let dragging=false,last={x:0,y:0};
        canvas.addEventListener('pointerdown',e=>{dragging=true;last={x:e.clientX,y:e.clientY};canvas.setPointerCapture(e.pointerId)});
        canvas.addEventListener('pointerup',()=>dragging=false);
        canvas.addEventListener('pointermove',e=>{if(!dragging)return;world.x+=e.clientX-last.x;world.y+=e.clientY-last.y;last={x:e.clientX,y:e.clientY};});

        const shadow=new PIXI.Graphics();
        shadow.beginFill(0x000000,0.5).drawEllipse(0,140,260,85).endFill();
        world.addChild(shadow);

        const floor=new PIXI.Container(); world.addChild(floor);
        for(let i=0;i<12;i++)for(let j=0;j<10;j++){
          const p=iso(i,j), g=new PIXI.Graphics();
          const base=((i+j)%2===0)?0x241a52:0x1a123f;
          g.beginFill(base,1)
            .lineStyle(1,0x6f5bb4,0.6)
            .moveTo(0,-TILE_H/2).lineTo(TILE_W/2,0).lineTo(0,TILE_H/2).lineTo(-TILE_W/2,0).closePath().endFill();
          g.x=p.x; g.y=p.y; floor.addChild(g);
        }

        function rect(x,y,w,h,fill,stroke){
          const g=new PIXI.Graphics();
          g.beginFill(fill,1).lineStyle(1,stroke,0.7).drawRect(-w/2,-h/2,w,h).endFill();
          g.x=x; g.y=y; return g;
        }

        const consoleGlow=new PIXI.Graphics();
        consoleGlow.beginFill(0x6ef8ff,0.1).drawEllipse(120,5,190,110).endFill();
        world.addChild(consoleGlow);

        const warm=new PIXI.Graphics();
        warm.beginFill(0xffc76b,0.08).drawEllipse(-20,92,170,95).endFill();
        world.addChild(warm);

        const desk=rect(-10,70,140,46,0x3a2b7a,0x6c56ba); world.addChild(desk);
        const chair=rect(-115,78,44,44,0x2f245e,0x5a4696); world.addChild(chair);
        const consoleBase=rect(120,5,170,40,0x1f1a41,0x4d3c8e); world.addChild(consoleBase);
        const fire=rect(-190,-5,92,34,0x271b4f,0x6f5bb4); world.addChild(fire);
        const door=rect(190,92,54,64,0x271b4f,0x6f5bb4); world.addChild(door);

        const worker=new PIXI.Container();
        const head=rect(0,-14,14,14,0xffd8b4,0x2f204f);
        const body=rect(0,0,18,22,0x30d5ff,0x2f204f);
        worker.addChild(head,body); worker.x=-78; worker.y=58; world.addChild(worker);

        const tap=(obj,msg)=>{obj.eventMode='static';obj.cursor='pointer';obj.on('pointertap',()=>alert(msg));obj.on('pointerover',()=>obj.alpha=0.85);obj.on('pointerout',()=>obj.alpha=1)};
        tap(desk,'Desk → Ops panel (next)'); tap(consoleBase,'Console → Systems (next)'); tap(fire,'Fireplace → Recovery (next)'); tap(door,'Door → Travel locked');

        let t=0; app.ticker.add(()=>{t+=0.06;worker.y=58+Math.sin(t)*1.4;consoleGlow.alpha=0.08+(Math.sin(t*0.6)+1)*0.02;});

        window.addEventListener('resize',center);
      } catch(e){ fail(e && e.message ? e.message : String(e)); }
    })();
  </script>
</body>
</html>
